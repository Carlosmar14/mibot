<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bot de Telegram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤖 Mi Bot de Telegram</h1>
        <p>¡Bienvenido! Este es mi bot de Telegram.</p>
        
        <div class="bot-info">
            <h2>Comandos disponibles:</h2>
            <ul>
                <li><strong>/start</strong> - Inicia el bot</li>
                <li><strong>/ayuda</strong> - Muestra la ayuda</li>
                <li><strong>/info</strong> - Información del bot</li>
            </ul>
        </div>

        <div class="telegram-link">
            <h3>¡Prueba el bot!</h3>
            <a href="https://t.me/@shopcmar_bot" target="_blank" class="boton">
                Abrir en Telegram
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
