<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Sincronizado - shopcmar_bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI'; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 1200px; width: 100%; overflow: hidden; }
        
        /* Login */
        .login-screen { padding: 60px 40px; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .login-screen h1 { font-size: 2.5em; margin-bottom: 20px; }
        .login-screen p { margin-bottom: 40px; }
        .telegram-login-widget { display: flex; justify-content: center; margin: 30px 0; }
        
        /* Main */
        .main-screen { display: none; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .btn-logout { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 8px 25px; border-radius: 25px; cursor: pointer; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 40px; }
        
        /* Comandos */
        .commands-section { background: #f8f9fa; border-radius: 15px; padding: 25px; }
        .command-item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid #667eea; }
        .command-item:hover { transform: translateX(5px); }
        
        /* Chat */
        .chat-section { background: #f8f9fa; border-radius: 15px; padding: 25px; display: flex; flex-direction: column; height: 500px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: white; border-radius: 10px; margin-bottom: 15px; }
        .message { margin-bottom: 15px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.bot { align-items: flex-start; }
        .message-content { max-width: 80%; padding: 10px 15px; border-radius: 15px; }
        .message.user .message-content { background: #667eea; color: white; }
        .message.bot .message-content { background: #f0f0f0; color: #333; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 25px; }
        .chat-input button { width: 50px; height: 50px; background: #667eea; border: none; border-radius: 50%; color: white; cursor: pointer; }
        
        .stats-section { grid-column: 1 / -1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 15px; padding: 30px; color: white; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; }
        .stat-number { font-size: 2.5em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <h1>🤖 @shopcmar_bot</h1>
            <p>Inicia sesión con Telegram para usar el bot sincronizado</p>
            
            <div class="telegram-login-widget">
                <script async src="https://telegram.org/js/telegram-widget.js?22"
                        data-telegram-login="shopcmar_bot"
                        data-size="large"
                        data-radius="20"
                        data-onauth="onTelegramAuth(user)"
                        data-request-access="write">
                </script>
            </div>
            <div id="loginStatus" style="margin-top: 20px; padding: 10px; display: none;"></div>
        </div>

        <!-- Main Screen -->
        <div id="mainScreen" class="main-screen">
            <div class="header">
                <h1>🤖 @shopcmar_bot</h1>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div>
                        <div id="userName">Cargando...</div>
                        <div style="font-size: 0.8em;" id="userId"></div>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">Salir</button>
            </div>

            <div class="main-content">
                <!-- Comandos -->
                <div class="commands-section">
                    <h2>📋 Comandos</h2>
                    <div class="command-item" onclick="enviarComando('/start')">/start - Iniciar bot</div>
                    <div class="command-item" onclick="enviarComando('/ayuda')">/ayuda - Ver comandos</div>
                    <div class="command-item" onclick="enviarComando('/info')">/info - Información</div>
                    <div class="command-item" onclick="enviarComando('/hora')">/hora - Hora actual</div>
                    <div class="command-item" onclick="enviarComando('/perfil')">/perfil - Tu perfil</div>
                    <div class="command-item" onclick="enviarComando('/web')">/web - Abrir web</div>
                </div>

                <!-- Chat -->
                <div class="chat-section">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="Escribe un mensaje o comando..." onkeypress="if(event.key==='Enter') enviarMensaje()">
                        <button onclick="enviarMensaje()">➤</button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-section">
                    <div><span class="stat-number" id="statMensajes">0</span><br>Mensajes</div>
                    <div><span class="stat-number" id="statComandos">0</span><br>Comandos</div>
                    <div><span class="stat-number" id="statUsuarios">0</span><br>Online</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN CON TUS DATOS
        // ============================================
        const API_URL = "https://mibot-yuz8.onrender.com";  // ← TU SERVIDOR EN RENDER
        
        let currentUser = null;
        let sessionId = null;
        let ultimoId = 0;
        let mensajesCount = 0;
        let comandosCount = 0;
        let pollingInterval = null;

        window.onTelegramAuth = async function(user) {
            document.getElementById("loginStatus").style.display = "block";
            document.getElementById("loginStatus").textContent = "Verificando con el servidor...";
            
            try {
                const res = await fetch(`${API_URL}/auth/telegram`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(user)
                });
                
                const data = await res.json();
                
                if (data.success) {
                    currentUser = data.user;
                    sessionId = data.session;
                    
                    localStorage.setItem("user", JSON.stringify(currentUser));
                    localStorage.setItem("session", sessionId);
                    
                    document.getElementById("userName").textContent = 
                        `${currentUser.first_name} ${currentUser.last_name || ""}`;
                    document.getElementById("userId").textContent = `ID: ${currentUser.id}`;
                    
                    if (currentUser.photo_url) {
                        document.getElementById("userAvatar").innerHTML = 
                            `<img src="${currentUser.photo_url}">`;
                    }
                    
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("mainScreen").style.display = "block";
                    
                    // Mensaje de bienvenida
                    agregarMensaje({
                        origen: "bot",
                        texto: `¡Bienvenido ${currentUser.first_name}! 👋\n\nHas iniciado sesión con Telegram. Los mensajes que escribas aquí aparecerán en el bot y viceversa.`,
                        fecha: Date.now() / 1000
                    });
                    
                    iniciarPolling();
                } else {
                    document.getElementById("loginStatus").textContent = "Error de autenticación";
                }
            } catch (e) {
                document.getElementById("loginStatus").textContent = "Error de conexión con el servidor";
                console.error(e);
            }
        };

        function iniciarPolling() {
            pollingInterval = setInterval(async () => {
                if (!currentUser) return;
                
                try {
                    const res = await fetch(
                        `${API_URL}/api/recibir/${currentUser.id}?session=${sessionId}&ultimo_id=${ultimoId}`
                    );
                    const data = await res.json();
                    
                    if (data.mensajes && data.mensajes.length) {
                        data.mensajes.forEach(m => {
                            agregarMensaje(m);
                            if (m.origen !== "web") mensajesCount++;
                        });
                        document.getElementById("statMensajes").textContent = mensajesCount;
                    }
                    
                    if (data.ultimo_id > ultimoId) ultimoId = data.ultimo_id;
                    if (data.conectados) document.getElementById("statUsuarios").textContent = data.conectados;
                    
                } catch (e) {}
            }, 2000);
        }

        async function enviarMensaje() {
            const input = document.getElementById("messageInput");
            const texto = input.value.trim();
            if (!texto || !currentUser) return;
            
            agregarMensaje({ origen: "web", texto, fecha: Date.now()/1000 });
            
            mensajesCount++;
            if (texto.startsWith("/")) comandosCount++;
            
            document.getElementById("statMensajes").textContent = mensajesCount;
            document.getElementById("statComandos").textContent = comandosCount;
            
            input.value = "";
            
            await fetch(`${API_URL}/api/enviar`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: currentUser.id,
                    texto: texto,
                    session: sessionId
                })
            });
        }

        function enviarComando(comando) {
            document.getElementById("messageInput").value = comando;
            enviarMensaje();
        }

        function agregarMensaje(m) {
            const chat = document.getElementById("chatMessages");
            const div = document.createElement("div");
            div.className = `message ${m.origen === "web" ? "user" : "bot"}`;
            
            const hora = new Date(m.fecha * 1000).toLocaleTimeString();
            div.innerHTML = `<div class="message-content">${m.texto}<br><small>${hora}</small></div>`;
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function logout() {
            if (pollingInterval) clearInterval(pollingInterval);
            localStorage.clear();
            location.reload();
        }

        window.onload = function() {
            const user = localStorage.getItem("user");
            const session = localStorage.getItem("session");
            if (user && session) {
                currentUser = JSON.parse(user);
                sessionId = session;
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainScreen").style.display = "block";
                iniciarPolling();
            }
        };
    </script>
</body>
</html>
